<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Changi Incident 1998</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

body{
margin:0;
overflow:hidden;
background:black;
font-family:'VT323',monospace;
}

canvas{
width:100vw;
height:100vh;
display:block;
image-rendering:pixelated;
}

#hud{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:28px;
z-index:5;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:black;
color:white;
z-index:10;
}

button{
font-family:'VT323';
font-size:30px;
padding:10px 40px;
border:2px solid white;
background:#111;
color:white;
cursor:pointer;
}

#scan{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
background:repeating-linear-gradient(
0deg,
rgba(0,0,0,0) 0px,
rgba(0,0,0,0) 2px,
rgba(0,0,0,0.25) 3px
);
}
</style>
</head>

<body>

<div id="hud">CHANGI TERMINAL 1 — 03:14AM</div>

<div class="screen" id="start">
<h1>CHANGI INCIDENT</h1>
<p>Explore the abandoned airport.</p>
<button id="play">ENTER TERMINAL</button>
</div>

<div id="scan"></div>
<canvas id="game"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

let scene,camera,renderer;
let player=new THREE.Object3D();
let clock=new THREE.Clock();

let escalators=[];
let baggageBelts=[];
let npcs=[];
let lights=[];

let keys={};

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

document.getElementById("play").onclick=()=>{
document.getElementById("start").style.display="none";
init();
};

function init(){

renderer=new THREE.WebGLRenderer({canvas:game});
renderer.setSize(window.innerWidth,window.innerHeight);

scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,0.002);

camera=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,2000);

player.position.set(0,6,50);
player.add(camera);
scene.add(player);

const amb=new THREE.AmbientLight(0x888888);
scene.add(amb);

buildAirport();
animate();
}

function buildAirport(){

buildFloor(0);
buildFloor(30);

buildCheckIn();
buildSecurity();
buildDutyFree();
buildGates();

buildEscalator(0,0);
buildBaggageCarousel(60,-120);
buildNPCs();

buildSkytrain();
}

function buildFloor(y){

const floor=new THREE.Mesh(
new THREE.PlaneGeometry(800,800),
new THREE.MeshLambertMaterial({color:0x1a1c1f})
);

floor.rotation.x=-Math.PI/2;
floor.position.y=y;
scene.add(floor);
}

function buildCheckIn(){

for(let i=-200;i<200;i+=80){

const desk=new THREE.Mesh(
new THREE.BoxGeometry(40,6,10),
new THREE.MeshLambertMaterial({color:0x333333})
);

desk.position.set(i,3,0);
scene.add(desk);

for(let j=-15;j<20;j+=15){

const monitor=new THREE.Mesh(
new THREE.BoxGeometry(6,3,0.3),
new THREE.MeshBasicMaterial({color:0x33aaff})
);

monitor.position.set(i+j,8,0);
scene.add(monitor);

}
}
}

function buildSecurity(){

for(let i=-3;i<4;i++){

const lane=new THREE.Mesh(
new THREE.BoxGeometry(6,2,30),
new THREE.MeshLambertMaterial({color:0x444})
);

lane.position.set(i*15,1,-70);
scene.add(lane);

}
}

function buildDutyFree(){

for(let i=0;i<10;i++){

const shelf=new THREE.Mesh(
new THREE.BoxGeometry(10,10,4),
new THREE.MeshLambertMaterial({color:0x663300})
);

shelf.position.set(-200+i*40,5,-150);
scene.add(shelf);

}
}

function buildGates(){

for(let i=0;i<6;i++){

const gateArea=new THREE.Mesh(
new THREE.BoxGeometry(80,4,40),
new THREE.MeshLambertMaterial({color:0x222})
);

gateArea.position.set(-200+i*80,2,-300);
scene.add(gateArea);

}
}

function buildEscalator(x,z){

const escalator=new THREE.Group();

const ramp=new THREE.Mesh(
new THREE.BoxGeometry(12,1,40),
new THREE.MeshLambertMaterial({color:0x555})
);

ramp.rotation.x=-0.4;
escalator.add(ramp);

escalator.position.set(x,0,z);
scene.add(escalator);

escalators.push(ramp);
}

function buildBaggageCarousel(x,z){

const belt=new THREE.Mesh(
new THREE.TorusGeometry(20,3,8,40),
new THREE.MeshLambertMaterial({color:0x222})
);

belt.rotation.x=Math.PI/2;
belt.position.set(x,3,z);

scene.add(belt);
baggageBelts.push(belt);
}

function buildNPCs(){

for(let i=0;i<10;i++){

const npc=new THREE.Mesh(
new THREE.BoxGeometry(2,8,2),
new THREE.MeshLambertMaterial({color:0x111})
);

npc.position.set(
Math.random()*400-200,
4,
Math.random()*-400
);

scene.add(npc);
npcs.push(npc);
}
}

function buildSkytrain(){

const track=new THREE.Mesh(
new THREE.BoxGeometry(6,2,1200),
new THREE.MeshLambertMaterial({color:0x777})
);

track.position.set(120,40,0);
scene.add(track);

const train=new THREE.Mesh(
new THREE.BoxGeometry(6,6,40),
new THREE.MeshLambertMaterial({color:0xffffff})
);

train.position.set(120,44,-500);
scene.add(train);

lights.push(train);
}

function updatePlayer(dt){

let speed=40*dt;

if(keys["KeyW"])player.translateZ(-speed);
if(keys["KeyS"])player.translateZ(speed);
if(keys["KeyA"])player.translateX(-speed);
if(keys["KeyD"])player.translateX(speed);
}

function animate(){

requestAnimationFrame(animate);

let dt=clock.getDelta();

updatePlayer(dt);

escalators.forEach(e=>{
e.material.color.offsetHSL(0,0,Math.sin(clock.elapsedTime)*0.002);
});

baggageBelts.forEach(b=>{
b.rotation.z+=dt;
});

npcs.forEach(n=>{
n.position.x+=Math.sin(clock.elapsedTime+n.id)*dt*10;
});

lights.forEach(l=>{
l.position.z+=dt*60;
if(l.position.z>600)l.position.z=-600;
});

renderer.render(scene,camera);
}

</script>
</body>
</html>
